---

- name: Install python 3
  hosts: docker_server
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes 
    - name: Install python3
      apt:
        name: python3
        state: present

- name: Install Docker and Docker Compose v2
  hosts: docker_server
  become: yes

  tasks:
    # 1. Remove conflicting packages
    - name: Remove old Docker and containerd
      apt:
        name:
          - docker
          - docker-engine
          - docker.io
          - containerd
          - runc
        state: absent
        purge: yes
        autoremove: yes

    # 2. Install required dependencies
    - name: Install dependencies
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    # 3. Add Docker GPG key
    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
        gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    # 4. Add Docker repository
    - name: Add Docker repository
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
        https://download.docker.com/linux/ubuntu \
        $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
        | tee /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    # 5. Install Docker + Compose plugin
    - name: Install Docker and Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    # 6. Start and enable Docker
    - name: Ensure Docker is running
      systemd:
        name: docker
        state: started
        enabled: yes

    # 7. Add user to docker group (optional)
- name: Add ubuntu user to docker group
  hosts: docker_server
  become: yes
  tasks:
    - name: Add ubuntu to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes
    - name: Reconnection to apply group changes
      meta: reset_connection

- name: Start Docker container
  hosts: docker_server
  vars_files:
    - vars.yaml
  become: yes

  tasks:
    - name: Copy docker compose to server
      copy:
        src: /Users/mac/devop-project/mongo-app/docker-compose.yml
        dest: /home/ubuntu/docker-compose.yml

    - name: Docker login as ubuntu user
      docker_login:
        registry_url: https://index.docker.io/v1/
        username: vectorzy
        password: "{{ dockerhub_password }}"
      become: yes
      become_user: ubuntu

    - name: Run docker compose
      command: docker compose up -d
      args:
        chdir: /home/ubuntu